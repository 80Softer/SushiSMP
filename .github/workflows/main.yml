name: Wake Up Codespace
on:
  repository_dispatch:
    types: [start-server]

permissions: write-all

jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Codespace
        env:
          # ここを「MY_TOKEN」に変えることで最強のパワーを使えるようにします
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          # 自分のリポジトリ名を確認
          CS_NAME=$(gh codespace list --repo 80Softer/SushiSMP --json name -q '.[0].name')
          
          if [ -z "$CS_NAME" ]; then
            echo "❌ Codespaceが見つかりませんでした。"
            exit 1
          fi
          
          echo "🚀 Codespace '$CS_NAME' を起動します..."
          gh codespace resume -c "$CS_NAME"
          echo "✅ 起動命令を送信しました！"
