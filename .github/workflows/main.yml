name: Wake Up Codespace
on:
  repository_dispatch:
    types: [start-server]

# 変なエラーを避けるために、許可設定を一番シンプルにしたよ
permissions: write-all

jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Codespace
        env:
          # ここは変えずにそのままでOK
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ユーザー名の「S」を大文字（80Softer）に合わせたよ
          CS_NAME=$(gh codespace list --repo 80Softer/SushiSMP --json name -q '.[0].name')
          
          if [ -z "$CS_NAME" ]; then
            echo "❌ Codespaceが見つかりませんでした。"
            exit 1
          fi
          
          echo "🚀 Codespace '$CS_NAME' を起動します..."
          # 確実に起動させるコマンドに変更
          gh codespace resume -c "$CS_NAME"
          echo "✅ 起動命令を送信しました！"
