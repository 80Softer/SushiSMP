name: Wake Up Codespace
on:
  repository_dispatch:
    types: [start-server]

jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Codespace
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 最初のCodespaceを探して起動命令を出す
          CS_NAME=$(gh codespace list --json name -q '.[0].name')
          gh codespace code -c $CS_NAME
