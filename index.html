<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SushiSMP - Server Control</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 340px; }
        h1 { color: #333; margin-bottom: 1.5rem; font-size: 1.6rem; }
        #start-btn { background-color: #28a745; color: white; border: none; padding: 16px 28px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: bold; width: 100%; transition: 0.2s; }
        #start-btn:active { transform: scale(0.98); }
        #start-btn:disabled { background-color: #bbb; cursor: not-allowed; }
        #msg { margin-top: 1.2rem; font-size: 0.95rem; color: #555; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>🍣 SushiSMP Portal</h1>
    <button id="start-btn" onclick="runBootProcess()">🚀 サーバーを起動する</button>
    <div id="msg">ボタンを押してサーバーをオン！</div>
</div>

<script>
async function runBootProcess() {
    // あなたの最新URLです
    const gasUrl = "https://script.google.com/macros/s/AKfycbxrMDadZoA-MLZMi3YjVzTQU_OZvcuPHydTwF5AVPIVAXNQi8lyLL3QJIeuEy_ej9k1bg/exec";
    
    const btn = document.getElementById('start-btn');
    const msg = document.getElementById('msg');

    btn.disabled = true;
    msg.innerText = "信号を送信中...";

    try {
        // mode: 'no-cors' でブラウザのブロックを回避
        await fetch(gasUrl, { method: "POST", mode: "no-cors" });
        
        msg.style.color = "#28a745";
        msg.innerText = "✅ 送信完了！Actionsを見てね！";
        
    } catch (e) {
        msg.style.color = "#dc3545";
        msg.innerText = "❌ 送信に失敗しました";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
